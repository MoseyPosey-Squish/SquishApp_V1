<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squishmallow Dex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1>Squishmallow Dex</h1>
        <p class="subtitle">Live Google Sheet powered, fully dynamic schema</p>
      </div>
      <div class="header-meta">
        <p id="itemCount">Items: 0</p>
        <p id="lastUpdated">Last updated: --</p>
      </div>
    </header>

    <section class="controls">
      <div class="control-group">
        <label for="searchInput">Search all fields</label>
        <input id="searchInput" type="search" placeholder="Type anything..." autocomplete="off">
      </div>

      <div class="control-group">
        <label for="sortField">Sort field</label>
        <select id="sortField"></select>
      </div>

      <div class="control-group">
        <label for="sortDirection">Direction</label>
        <select id="sortDirection">
          <option value="asc">Ascending</option>
          <option value="desc">Descending</option>
        </select>
      </div>
    </section>

    <section class="field-toggle-wrap">
      <button id="toggleFieldsButton" class="ghost-btn" type="button" aria-expanded="false">
        Toggle visible card fields
      </button>
      <div id="fieldTogglePanel" class="field-toggle-panel" hidden></div>
    </section>

    <section id="dynamicFilters" class="filters"></section>

    <section class="status-area">
      <p id="loadingState" class="status loading">Loading data...</p>
      <p id="errorState" class="status error" hidden></p>
      <p id="emptyState" class="status empty" hidden>No results found.</p>
    </section>

    <main id="cardGrid" class="card-grid" aria-live="polite"></main>
  </div>

  <div id="detailModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button id="closeModalBtn" class="modal-close" type="button" aria-label="Close details">&times;</button>
      <h2 id="modalTitle">Details</h2>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
